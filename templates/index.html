<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender - AI Loan Predictor</title>
    <!-- Tailwind CSS ఉపయోగించి డిజైన్ చేయడం -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-2">Smart Lender 💰</h1>
        <p class="text-gray-500 text-center mb-8">AI-Powered Loan Approval Prediction System</p>

        <!-- ప్రిడిక్షన్ రిజల్ట్ ఇక్కడ చూపిస్తాం -->
        {% if prediction_text %}
            <div class="mb-6 p-4 rounded-xl text-center font-bold text-lg 
                {% if 'Approved' in prediction_text %} bg-green-100 text-green-700 {% else %} bg-red-100 text-red-700 {% endif %}">
                {{ prediction_text }}
            </div>
        {% endif %}

        <form action="/predict" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Gender -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Gender (లింగం)</label>
                <select name="Gender" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" required>
                    <option value="1">Male (పురుషులు)</option>
                    <option value="0">Female (స్త్రీలు)</option>
                </select>
            </div>

            <!-- Married -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Married (వైవాహిక స్థితి)</label>
                <select name="Married" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" required>
                    <option value="1">Yes (అయింది)</option>
                    <option value="0">No (కాలేదు)</option>
                </select>
            </div>

            <!-- Dependents -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Dependents (ఆధారపడినవారు)</label>
                <select name="Dependents" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" required>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3 or more</option>
                </select>
            </div>

            <!-- Education -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Education (చదువు)</label>
                <select name="Education" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" required>
                    <option value="0">Graduate (గ్రాడ్యుయేట్)</option>
                    <option value="1">Not Graduate (నాన్-గ్రాడ్యుయేట్)</option>
                </select>
            </div>

            <!-- Self Employed -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Self Employed (స్వయం ఉపాధి)</label>
                <select name="Self_Employed" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" required>
                    <option value="0">No (ఉద్యోగం)</option>
                    <option value="1">Yes (సొంత వ్యాపారం)</option>
                </select>
            </div>

            <!-- Applicant Income -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Applicant Income (మీ నెలసరి ఆదాయం)</label>
                <input type="number" name="ApplicantIncome" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g. 5000" required>
            </div>

            <!-- Coapplicant Income -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Co-applicant Income (సహ-దరఖాస్తుదారు ఆదాయం)</label>
                <input type="number" name="CoapplicantIncome" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g. 1500" required>
            </div>

            <!-- Loan Amount -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Loan Amount (కోరుకుంటున్న లోన్ - వేలల్లో)</label>
                <input type="number" name="LoanAmount" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g. 120 (for 1,20,000)" required>
            </div>

            <!-- Loan Amount Term -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Loan Term (గడువు - నెలల్లో)</label>
                <input type="number" name="Loan_Amount_Term" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g. 360 (for 30 years)" required>
            </div>

            <!-- Credit History -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Credit History (క్రెడిట్ హిస్టరీ)</label>
                <select name="Credit_History" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" required>
                    <option value="1">Good (గతంలో అప్పులు కరెక్ట్‌గా కట్టారు)</option>
                    <option value="0">Bad (గతంలో బకాయిలు ఉన్నాయి)</option>
                </select>
            </div>

            <!-- Property Area -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Property Area (ఉండే ప్రాంతం)</label>
                <select name="Property_Area" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" required>
                    <option value="2">Urban (పట్టణం)</option>
                    <option value="1">Semiurban (నగర శివారు)</option>
                    <option value="0">Rural (గ్రామీణ ప్రాంతం)</option>
                </select>
            </div>

            <!-- Submit Button -->
            <div class="md:col-span-2 text-center mt-4">
                <button type="submit" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-lg transition duration-300 shadow-md">
                    Check Loan Status (అర్హతను తనిఖీ చేయండి)
                </button>
            </div>
        </form>
    </div>

</body>
</html>
